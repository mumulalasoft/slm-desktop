---
# Config for slm-partition Calamares job module.
# See src/installer/calamares-modules/slm-partition/SlmPartitionJob.cpp.

# When true, the module logs the destructive sgdisk + mkfs sequence it
# would run and returns ok without touching the disk. When false, the
# module actually wipes and partitions the disk identified by
# slm.target.disk — guarded additionally by slm.target.confirmed=true.
#
# Default true. Live ISOs ship with this off (false) so a real install
# proceeds end-to-end once the user clicks Install on the §2.5 summary.
dry-run: true
