---
# Config for slm-fstab Calamares job module.
# See src/installer/calamares-modules/slm-fstab/SlmFstabJob.cpp.

# When true, the module renders the fstab with placeholder UUIDs and
# logs the result without writing to disk. When false, blkid resolves
# the real UUIDs and the rendered file is written to
# $ROOT/etc/fstab — guarded additionally by slm.target.confirmed=true.
dry-run: true
