# SLM Installer — Calamares pipeline configuration.
# See docs/SLM_INSTALLER_BACKEND.md §5 for the rationale behind this ordering.

modules-search: [ local, /usr/lib/calamares/modules ]

sequence:
  - show:
      - welcome
      - slm-disk-select
      - summary
  - exec:
      - slm-uefi-check
      - slm-hardware-probe
      - slm-partition
      - slm-btrfs-layout
      - slm-deploy
      - slm-fstab
      - slm-bootloader
      - slm-recovery
      - slm-snapshot
      - slm-protected-packages
      - slm-firstboot
  - show:
      - finished

branding: slm

prompt-install: true
dont-chroot: false
