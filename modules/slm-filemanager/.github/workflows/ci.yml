name: slm-filemanager CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  standalone-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            qt6-base-dev \
            qt6-declarative-dev \
            libglib2.0-dev

      - name: Standalone CI smoke
        run: |
          scripts/ci-smoke.sh
