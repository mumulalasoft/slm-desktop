name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  runtime-manifest-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Runtime manifest report
        run: |
          chmod +x scripts/check-runtime-manifest.sh
          scripts/check-runtime-manifest.sh

  repo-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Core governance files exist
        run: |
          test -f .github/CODEOWNERS
          test -f .github/pull_request_template.md
          test -f CONTRIBUTING.md

  quick-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Shell syntax lint for scripts
        run: |
          shopt -s nullglob
          for f in scripts/*.sh scripts/xdg-desktop-portal/*.sh; do
            bash -n "$f"
          done

      - name: Rebrand guard (no legacy desktop shell naming)
        run: |
          if [[ -d modules/desktop-shell-core || -d modules/desktop-shell-style ]]; then
            echo "Legacy module directory still exists"
            exit 1
          fi

  policy-core-only:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            meson \
            libxkbcommon-dev \
            libglib2.0-dev \
            libwayland-dev \
            wayland-protocols

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtshadertools'
          cache: true

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Build policy-core suite target
        run: cmake --build build --target policy_core_test_suite -j

      - name: Run policy-core suite (strict)
        env:
          SLM_POLICY_CORE_SKIP_BUILD: "1"
          SLM_POLICY_CORE_MIN_TESTS: "1"
          SLM_POLICY_CORE_STRICT_NAMES: "1"
          SLM_POLICY_CORE_EXPECTED_TESTS: "settingsapp_policy_core_test"
        run: scripts/test-policy-core-suite.sh build

  desktop-runtime-smoke:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            meson \
            libxkbcommon-dev \
            libglib2.0-dev \
            libwayland-dev \
            wayland-protocols

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtshadertools'
          cache: true

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Build desktop runtime target
        run: cmake --build build --target slm-desktop -j

      - name: Smoke runtime
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          scripts/smoke-runtime.sh --build-dir build --app-bin build/slm-desktop

      - name: Smoke backends
        env:
          QT_QPA_PLATFORM: offscreen
          DS_WINDOWING_AUTOROLLBACK: "1"
        run: |
          scripts/smoke-backends.sh --build-dir build --app-bin build/slm-desktop

      - name: Smoke tothespot
        env:
          QT_QPA_PLATFORM: offscreen
          SLM_SMOKE_BUILD: "0"
        run: |
          scripts/smoke-tothespot-contextmenu.sh --build-dir build --app-bin build/slm-desktop

  build-and-test:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SLM_FILEMANAGER_EXTERNAL_REPO: https://github.com/mumulalasoft/slm-filemanager.git
      SLM_FILEMANAGER_EXTERNAL_BRANCH: main
      SLM_FILEMANAGER_EXTERNAL_ROOT: build/external-filemanager-ci
      SLM_FILEMANAGER_EXTERNAL_PREFIX: build/external-filemanager-ci/install/slm-filemanager

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            meson \
            libxkbcommon-dev \
            libglib2.0-dev

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtshadertools'
          cache: true

      - name: Prepare external FileManager package (staging default)
        run: |
          SLM_EXTERNAL_FM_SKIP_SHELL=1 \
          scripts/bootstrap-external-filemanager-package.sh \
            "${SLM_FILEMANAGER_EXTERNAL_REPO}" \
            "${SLM_FILEMANAGER_EXTERNAL_BRANCH}" \
            "${SLM_FILEMANAGER_EXTERNAL_ROOT}"

      - name: Configure (external FileManager package mode)
        run: |
          cmake -S . -B build -G Ninja \
            -DSLM_USE_EXTERNAL_FILEMANAGER_PACKAGE=ON \
            -DCMAKE_PREFIX_PATH="${SLM_FILEMANAGER_EXTERNAL_PREFIX}"

      - name: UI style lint
        run: cmake --build build --target lint_ui_style

      - name: Build
        run: cmake --build build -j

      - name: Run headless tests (nightly lane)
        env:
          SLM_TEST_SKIP_UI_LINT: "1"
          SLM_TEST_SKIP_CAPABILITY_MATRIX_LINT: "1"
          SLM_TEST_NIGHTLY_POLKIT_RUNTIME_MODE: auto
          SLM_TEST_NIGHTLY_PACKAGE_POLICY_WRAPPER_MODE: auto
          SLM_TEST_NIGHTLY_FULL_EXCLUDE_LABELS: "baseline-flaky;secret-consent;policy-core"
          SLM_TEST_NIGHTLY_SECRET_CONSENT_MODE: required
          SLM_TEST_NIGHTLY_POLICY_CORE_MODE: required
          SLM_TEST_NIGHTLY_POLICY_CORE_SKIP_BUILD: "1"
          SLM_POLICY_CORE_SKIP_BUILD: "1"
          SLM_POLICY_CORE_MIN_TESTS: "1"
          SLM_POLICY_CORE_STRICT_NAMES: "1"
          SLM_POLICY_CORE_EXPECTED_TESTS: "settingsapp_policy_core_test"
          SLM_TEST_NIGHTLY_SECRET_CONSENT_SKIP_BUILD: "1"
          SLM_SECRET_CONSENT_MIN_TESTS: "6"
          SLM_SECRET_CONSENT_STRICT_NAMES: "1"
          SLM_SECRET_CONSENT_EXPECTED_TESTS: "portal_secret_integration_test,portal_consent_dialog_copy_contract_test,portal_consent_dialog_behavior_test,portal_dialog_bridge_payload_test,portal_secret_consent_contract_snapshot_test,settingsapp_secret_consent_test"
        run: scripts/test.sh nightly build

      - name: Run baseline-flaky lane (non-blocking report)
        continue-on-error: true
        env:
          QT_QPA_PLATFORM: offscreen
        run: scripts/test.sh baseline-flaky build

      - name: Run backend smoke checks
        env:
          QT_QPA_PLATFORM: offscreen
          DS_WINDOWING_AUTOROLLBACK: "1"
        run: scripts/smoke-backends.sh

      - name: Run portal profile/artifact smoke checks
        env:
          QT_QPA_PLATFORM: offscreen
          SLM_PORTAL_SKIP_SYSTEMCTL: "1"
        run: |
          ctest --test-dir build -R "(portal_portals_conf_strategy_test|portal_install_script_integration_test|portal_profile_snapshot_test|portal_slm_portal_snapshot_test|portal_dbus_service_template_snapshot_test|portal_systemd_unit_template_snapshot_test|portal_profile_smoke_test|portal_installed_artifacts_smoke_test)" --output-on-failure

  packagepolicy-wrapper-smoke:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            meson \
            libglib2.0-dev

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtshadertools'
          cache: true

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Build package policy targets
        run: cmake --build build --target slm-package-policy-service packagepolicy_engine_test packagepolicy_oneshot_cli_test -j

      - name: Install wrappers into user PATH sandbox
        run: |
          ROOT_DIR="${RUNNER_TEMP}/slm-package-policy"
          BIN_DIR="${RUNNER_TEMP}/slm-package-policy-bin"
          scripts/package-policy/install-wrappers.sh \
            "${ROOT_DIR}" \
            "${BIN_DIR}" \
            --install-profile-script "${RUNNER_TEMP}/slm-package-policy-path.sh"
          echo "${BIN_DIR}" >> "${GITHUB_PATH}"

      - name: Run package policy runtime smoke
        env:
          SLM_PACKAGE_POLICY_RUNTIME_SMOKE: "1"
          SLM_PACKAGE_POLICY_WRAPPER_SMOKE_STRICT: "1"
          SLM_PACKAGE_POLICY_SERVICE_BIN: "${{ github.workspace }}/build/slm-package-policy-service"
          SLM_PACKAGE_POLICY_PROTECTED_FILE: "${{ github.workspace }}/config/package-policy/protected-capabilities.yaml"
          SLM_PACKAGE_POLICY_MAPPING_FILE: "${{ github.workspace }}/config/package-policy/package-mappings/debian.yaml"
          SLM_PACKAGE_POLICY_SOURCE_POLICIES_DIR: "${{ github.workspace }}/config/package-policy/source-policies"
        run: |
          scripts/smoke-package-policy-wrapper.sh

  filemanager-integration-modes:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SLM_FILEMANAGER_EXTERNAL_REPO: https://github.com/mumulalasoft/slm-filemanager.git
      SLM_FILEMANAGER_EXTERNAL_BRANCH: main
      SLM_FILEMANAGER_EXTERNAL_ROOT: build/filemanager-integration/remote-external
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            meson \
            libxkbcommon-dev \
            libglib2.0-dev

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtshadertools'
          cache: true

      - name: Build/test FileManager integration modes
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          scripts/test-filemanager-integration-modes.sh build/filemanager-integration

      - name: Run FileManager DBus stable gate
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          scripts/test-filemanager-dbus-gates.sh --build-dir build/filemanager-integration/in-tree --stable

  filemanager-compatibility-pinned:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            meson \
            libxkbcommon-dev \
            libglib2.0-dev

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtshadertools'
          cache: true

      - name: Validate pinned FileManager package compatibility
        env:
          QT_QPA_PLATFORM: offscreen
          SLM_FILEMANAGER_PINNED_VERSION: "0.1.0"
        run: |
          scripts/test-filemanager-compatibility-pinned.sh build/filemanager-compatibility

  filemanager-recovery-strict-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            meson \
            libxkbcommon-dev \
            libglib2.0-dev

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtshadertools'
          cache: true

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Build strict recovery test target
        run: cmake --build build --target filemanagerapi_daemon_recovery_test -j

      - name: Run strict FileManager DBus recovery gate
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          scripts/test-filemanager-dbus-gates.sh --build-dir build --strict

  portal-profile-matrix:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [mvp, beta, production]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate portal profile
        env:
          SLM_PORTAL_SKIP_SYSTEMCTL: "1"
        run: |
          scripts/xdg-desktop-portal/portal-profile-smoke-test.sh "${{ matrix.profile }}"

      - name: Validate installed artifacts for profile
        env:
          SLM_PORTAL_SKIP_SYSTEMCTL: "1"
        run: |
          scripts/xdg-desktop-portal/portal-installed-artifacts-smoke-test.sh "${{ matrix.profile }}"

  portal-interop-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            meson \
            libxkbcommon-dev \
            libglib2.0-dev

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtshadertools'
          cache: true

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Build portal test targets
        run: |
          cmake --build build --target \
            inputcaptureservice_dbus_test \
            portalservice_dbus_test \
            implportalservice_dbus_test \
            implportal_payload_snapshot_test \
            portal_adapter_lifecycle_persistence_test \
            portalresponseserializer_contract_test \
            portal_app_context_resolver_test \
            portal_portals_conf_strategy_test \
            portal_install_script_integration_test \
            portal_profile_snapshot_test \
            portal_slm_portal_snapshot_test \
            portal_dbus_service_template_snapshot_test \
            portal_systemd_unit_template_snapshot_test \
            -j

      - name: Run portal DBus/adapter subset
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ctest --test-dir build -R "(inputcaptureservice_dbus_test|portalservice_dbus_test|implportalservice_dbus_test|implportal_payload_snapshot_test|portal_adapter_lifecycle_persistence_test|portalresponseserializer_contract_test|portal_app_context_resolver_test)" --output-on-failure

      - name: Run portal config/smoke subset
        env:
          QT_QPA_PLATFORM: offscreen
          SLM_PORTAL_SKIP_SYSTEMCTL: "1"
        run: |
          ctest --test-dir build -R "(portal_portals_conf_strategy_test|portal_install_script_integration_test|portal_profile_snapshot_test|portal_slm_portal_snapshot_test|portal_dbus_service_template_snapshot_test|portal_systemd_unit_template_snapshot_test|portal_profile_smoke_test|portal_installed_artifacts_smoke_test)" --output-on-failure

  tothespot-quick:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            meson \
            libxkbcommon-dev \
            libglib2.0-dev

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtshadertools'
          cache: true

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: UI style lint
        run: cmake --build build --target lint_ui_style

      - name: Build
        run: cmake --build build -j

      - name: Tothespot CI gate (quick)
        env:
          QT_QPA_PLATFORM: offscreen
        run: scripts/test-tothespot.sh

  tothespot-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            meson \
            libxkbcommon-dev \
            libglib2.0-dev

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtshadertools'
          cache: true

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: UI style lint
        run: cmake --build build --target lint_ui_style

      - name: Build
        run: cmake --build build -j

      - name: Tothespot CI gate (full)
        env:
          QT_QPA_PLATFORM: offscreen
        run: scripts/test-tothespot.sh --full
