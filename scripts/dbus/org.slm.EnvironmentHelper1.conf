<!DOCTYPE busconfig PUBLIC
    "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
    "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Only root may own this service name. -->
  <policy user="root">
    <allow own="org.slm.EnvironmentHelper1"/>
  </policy>

  <!-- Any local user may send messages; the helper enforces polkit internally. -->
  <policy context="default">
    <allow send_destination="org.slm.EnvironmentHelper1"/>
  </policy>

</busconfig>
