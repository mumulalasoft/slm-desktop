<!DOCTYPE busconfig PUBLIC
    "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
    "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Only root may own this service name on the system bus. -->
  <policy user="root">
    <allow own="org.slm.Desktop.Fsd1"/>
  </policy>

  <!-- Any local (console) user may send method calls.
       slm-fsd enforces polkit authorization internally for all mutating verbs.
       Read-only queries (Ping, IsProtected, GetTokens) do not require polkit. -->
  <policy context="default">
    <allow send_destination="org.slm.Desktop.Fsd1"/>
  </policy>

</busconfig>
