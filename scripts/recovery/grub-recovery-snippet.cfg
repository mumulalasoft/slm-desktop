# GRUB config snippet for boot-failure/recovery integration.
# Requires grubenv variables written by bootcount-guard.sh:
# - slm_bootcount
# - slm_force_recovery
# - slm_disable_auto_recovery (manual override)

load_env

# Manual override from grubenv disables auto recovery selection.
if [ "${slm_disable_auto_recovery}" = "1" ]; then
  set slm_force_recovery=0
fi

# Fallback in GRUB side: if bootcount is already above threshold (default 3),
# force recovery default entry.
if [ "${slm_bootcount}" = "3" ] || [ "${slm_bootcount}" = "4" ] || [ "${slm_bootcount}" = "5" ] || [ "${slm_bootcount}" = "6" ] || [ "${slm_bootcount}" = "7" ] || [ "${slm_bootcount}" = "8" ] || [ "${slm_bootcount}" = "9" ]; then
  set slm_force_recovery=1
fi

if [ "${slm_force_recovery}" = "1" ]; then
  set default="slm-recovery"
  set timeout=3
fi

menuentry 'SLM Recovery Mode' --id slm-recovery {
  search --no-floppy --label --set=recovery_part RECOVERY
  if [ -z "${recovery_part}" ]; then
    echo 'RECOVERY partition not found'
    sleep 3
    return
  fi

  # Adjust kernel/initrd paths to match your recovery partition image.
  linux /vmlinuz-linux root=LABEL=RECOVERY ro quiet systemd.unit=multi-user.target slm.recovery=1
  initrd /initramfs-linux.img
}
